<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kerala Bus Mini Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  background: #000;
  font-size: 24px;
  font-weight: bold;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
}

canvas {
  background: #444;
  border: 3px solid white;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>🚀 Trideva Interactive</header>

<h2>Kerala Bus Mini Simulator</h2>
<p>Use ← → keys to move</p>

<button onclick="startGame()">Play Game</button>

<div id="gameArea" style="display:none;">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <p>Score: <span id="score">0</span></p>
  <button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let bus = { x: 180, y: 500, width: 40, height: 80, speed: 5 };
let traffic = [];
let score = 0;
let gameOver = false;

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") bus.x -= bus.speed;
  if (e.key === "ArrowRight") bus.x += bus.speed;
});

function spawnTraffic() {
  let x = Math.random() * (canvas.width - 40);
  traffic.push({ x: x, y: -80, width: 40, height: 80 });
}

function drawBus() {
  ctx.fillStyle = "yellow";
  ctx.fillRect(bus.x, bus.y, bus.width, bus.height);
}

function drawTraffic() {
  ctx.fillStyle = "red";
  traffic.forEach(car => ctx.fillRect(car.x, car.y, car.width, car.height));
}

function updateTraffic() {
  traffic.forEach(car => {
    car.y += 4;

    if (
      bus.x < car.x + car.width &&
      bus.x + bus.width > car.x &&
      bus.y < car.y + car.height &&
      bus.y + bus.height > car.y
    ) {
      gameOver = true;
    }
  });

  traffic = traffic.filter(car => car.y < canvas.height);
}

function drawRoad() {
  ctx.strokeStyle = "white";
  ctx.setLineDash([20, 15]);
  ctx.beginPath();
  ctx.moveTo(200, 0);
  ctx.lineTo(200, 600);
  ctx.stroke();
}

function gameLoop() {
  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 110, 300);
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();
  drawBus();
  drawTraffic();
  updateTraffic();

  score++;
  document.getElementById("score").innerText = score;

  requestAnimationFrame(gameLoop);
}

setInterval(spawnTraffic, 1500);

function restartGame() {
  traffic = [];
  score = 0;
  gameOver = false;
  bus.x = 180;
  gameLoop();
}

function startGame() {
  document.getElementById("gameArea").style.display = "block";
  gameLoop();
}
</script>

</body>
</html>
